<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APS Québec | Agents de Proximité en Santé propulsés par Vaistat</title>
    <meta name="description" content="APS Québec déploie des Agents de Proximité en Santé pour soutenir la continuité des soins : décharge hospitalière, accompagnement médical, livraison de médicaments, prélèvements, visites de suivi et monitoring connecté." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Netlify Forms detection -->
    <form name="aps-connect" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="espace" />
      <input type="text" name="prenom" />
      <input type="text" name="nom" />
      <input type="email" name="email" />
      <input type="tel" name="tel" />
      <input type="text" name="organisation" />
    </form>
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="nom" />
      <input type="text" name="organisation" />
      <input type="text" name="titre" />
      <input type="email" name="email" />
      <input type="tel" name="tel" />
      <input type="text" name="typeOrganisation" />
      <input type="text" name="sujet" />
      <textarea name="message"></textarea>
    </form>
    <form name="candidature-aps" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="prenom" />
      <input type="text" name="nom" />
      <input type="email" name="email" />
      <input type="tel" name="tel" />
      <input type="text" name="ville" />
      <input type="text" name="disponibilite" />
      <textarea name="message"></textarea>
    </form>
    <form name="devenir-partenaire" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="forfait" />
      <input type="text" name="prenom" />
      <input type="text" name="nom" />
      <input type="email" name="email" />
      <input type="tel" name="tel" />
      <input type="text" name="typeRessource" />
      <input type="text" name="nomRessource" />
      <input type="text" name="adresse" />
      <input type="text" name="ville" />
      <input type="text" name="codePostal" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
